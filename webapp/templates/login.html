<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>登录 - HAPPO-GNN-RL 充电站调度系统</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}?v={{ range(100000, 999999) | random }}">
    <script>
        window.onpageshow = function(event) {
            if (event.persisted) { window.location.reload(true); }
        };
        if (!window.location.search.includes('_nocache')) {
            var url = new URL(window.location.href);
            url.searchParams.set('_nocache', Date.now());
            window.history.replaceState({}, '', url);
        }
    </script>
</head>
<body>
<div class="auth-container">
    <div class="auth-card">
        <h1>⚡ HAPPO-GNN-RL</h1>
        <h2>充电站调度系统</h2>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, msg in messages %}
                    <div class="flash {{ category }}">{{ msg }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}
        <form method="POST">
            <div class="form-group">
                <label>用户名</label>
                <input type="text" name="username" placeholder="请输入用户名" required autofocus>
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" name="password" placeholder="请输入密码" required>
            </div>
            <button type="submit" class="btn btn-block" style="margin-top:8px;">登 录</button>
        </form>
        <p class="auth-link">还没有账户？<a href="{{ url_for('register') }}">立即注册</a></p>
        <div class="demo-info">
            <p>📌 演示账户：</p>
            <p>管理员：admin / admin123</p>
            <p>普通用户：user / user123</p>
        </div>
    </div>
</div>
</body>
</html>
